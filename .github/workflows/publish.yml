name: Publish
run-name: Publish ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.target || inputs.target }}-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.channel || inputs.channel }}

on:
  workflow_dispatch:
    inputs:
      target:
        description: Moon project ID to publish
        required: true
        type: string
      channel:
        description: Distribution channel
        required: true
        default: next
        type: choice
        options:
          - next
          - latest
  repository_dispatch:
    types: [publish-package]

permissions:
  contents: write

concurrency:
  group: publish-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.target || inputs.target }}-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.channel || inputs.channel }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: publish-${{ github.event_name == 'repository_dispatch' && github.event.client_payload.target || inputs.target }}
    env:
      DISPATCH_TARGET: ${{ github.event.client_payload.target }}
      DISPATCH_CHANNEL: ${{ github.event.client_payload.channel }}
      DISPATCH_SOURCE_SHA: ${{ github.event.client_payload.source_sha }}
      DISPATCH_SOURCE_BRANCH: ${{ github.event.client_payload.source_branch }}
      MANUAL_TARGET: ${{ inputs.target }}
      MANUAL_CHANNEL: ${{ inputs.channel }}
      MANUAL_SOURCE_SHA: ${{ github.sha }}
      MANUAL_SOURCE_BRANCH: ${{ github.ref_name }}
      REQUEST_TARGET: ''
      REQUEST_CHANNEL: ''
      SOURCE_SHA: ''
      SOURCE_BRANCH: ''
    steps:
      - name: Validate publish request
        env:
          DISPATCH_SENDER: ${{ github.event.sender.login }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == repository_dispatch ]]; then
            REQUEST_TARGET="${DISPATCH_TARGET}"
            REQUEST_CHANNEL="${DISPATCH_CHANNEL}"
            SOURCE_SHA="${DISPATCH_SOURCE_SHA}"
            SOURCE_BRANCH="${DISPATCH_SOURCE_BRANCH}"
          else
            REQUEST_TARGET="${MANUAL_TARGET}"
            REQUEST_CHANNEL="${MANUAL_CHANNEL}"
            SOURCE_SHA="${MANUAL_SOURCE_SHA}"
            SOURCE_BRANCH="${MANUAL_SOURCE_BRANCH}"
          fi

          [[ -n "${REQUEST_TARGET}" ]] || { echo 'Publish target is empty' >&2; exit 1; }
          [[ "${REQUEST_TARGET}" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*$ ]] || {
            echo "Invalid publish target '${REQUEST_TARGET}'" >&2
            exit 1
          }
          [[ -n "${SOURCE_SHA}" ]] || { echo 'Source SHA is empty' >&2; exit 1; }
          [[ -n "${SOURCE_BRANCH}" ]] || { echo 'Source branch is empty' >&2; exit 1; }
          [[ "${SOURCE_SHA}" =~ ^[0-9a-f]{40}$ ]] || { echo "Invalid source SHA '${SOURCE_SHA}'" >&2; exit 1; }

          case "${REQUEST_CHANNEL}" in
            next|latest) ;;
            *) echo "Unsupported publish channel '${REQUEST_CHANNEL}'" >&2; exit 1 ;;
          esac
          case "${SOURCE_BRANCH}" in
            main|release/*) ;;
            *) echo "Unsupported source branch '${SOURCE_BRANCH}'" >&2; exit 1 ;;
          esac

          if [[ "${GITHUB_EVENT_NAME}" == repository_dispatch ]]; then
            [[ "${GITHUB_ACTOR}" == 'github-actions[bot]' ]] || {
              echo "Untrusted repository dispatch actor '${GITHUB_ACTOR}'" >&2
              exit 1
            }
            [[ "${DISPATCH_SENDER}" == 'github-actions[bot]' ]] || {
              echo "Untrusted repository dispatch sender '${DISPATCH_SENDER}'" >&2
              exit 1
            }
            if jq -e '.client_payload | has("tag") or has("mode") or has("version") or has("release_tag")' \
              "${GITHUB_EVENT_PATH}" >/dev/null; then
              echo 'Legacy publish metadata fields are forbidden' >&2
              exit 1
            fi
          fi

          {
            echo "REQUEST_TARGET=${REQUEST_TARGET}"
            echo "REQUEST_CHANNEL=${REQUEST_CHANNEL}"
            echo "SOURCE_SHA=${SOURCE_SHA}"
            echo "SOURCE_BRANCH=${SOURCE_BRANCH}"
          } >>"${GITHUB_ENV}"
      - name: Bootstrap trusted workflow checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.workflow_sha }}

      - name: Validate and check out immutable source
        run: |
          set -euo pipefail
          .github/tasks/checkout-publish-source "${SOURCE_SHA}" "${SOURCE_BRANCH}"

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@8794f0318b9df4a43a5ddc23cefd16f595b423dd # v0
        with:
          auto-install: true
          auto-setup: true

      - name: Restore Moon cache
        uses: ./.github/actions/moon-cache
        with:
          key-prefix: moon-publish
          cache-version: v1

      - id: metadata
        name: Resolve publish metadata
        env:
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail

          metadata="$(pkgs/tools/deployment/resolve-publish-metadata \
            "${REQUEST_TARGET}" "${REQUEST_CHANNEL}" "${SOURCE_BRANCH}" "${RUN_ATTEMPT}")"
          jq -e \
            --arg target "${REQUEST_TARGET}" \
            '.target == $target
              and (.source | length > 0)
              and (.version | length > 0)
              and (.release_tag | length > 0)' \
            >/dev/null <<<"${metadata}"

          publish_target="$(jq -r .target <<<"${metadata}")"
          publish_version="$(jq -r .version <<<"${metadata}")"
          publish_release_tag="$(jq -r .release_tag <<<"${metadata}")"
          publish_project_source="$(jq -r .source <<<"${metadata}")"
          metadata_compact="$(jq -c . <<<"${metadata}")"
          {
            echo "PUBLISH_TARGET=${publish_target}"
            echo "PUBLISH_CHANNEL=${REQUEST_CHANNEL}"
            echo "PUBLISH_VERSION=${publish_version}"
            echo "PUBLISH_RELEASE_TAG=${publish_release_tag}"
            echo "PUBLISH_PROJECT_SOURCE=${publish_project_source}"
            echo "PUBLISH_REF=${SOURCE_SHA}"
          } >>"${GITHUB_ENV}"
          echo "metadata=${metadata_compact}" >>"${GITHUB_OUTPUT}"

      - name: Resolve GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          .github/tasks/ensure-publish-release \
            "${PUBLISH_CHANNEL}" "${PUBLISH_RELEASE_TAG}" "${PUBLISH_REF}"

      - name: Publish target
        env:
          GH_TOKEN: ${{ github.token }}
          CI: ""
        run: |
          set -euo pipefail
          moon run "${PUBLISH_TARGET}:publish" --force

      - name: Publish summary
        if: always()
        run: |
          {
            echo '## Publish summary'
            echo
            echo '| Field | Value |'
            echo '|---|---|'
            echo "| target | \`${PUBLISH_TARGET:-${REQUEST_TARGET}}\` |"
            echo "| channel | \`${PUBLISH_CHANNEL:-${REQUEST_CHANNEL}}\` |"
            echo "| version | \`${PUBLISH_VERSION:-unresolved}\` |"
            echo "| release tag | \`${PUBLISH_RELEASE_TAG:-unresolved}\` |"
            echo "| branch | \`${SOURCE_BRANCH}\` |"
            echo "| SHA | \`${SOURCE_SHA}\` |"
            echo "| trigger | \`${GITHUB_EVENT_NAME}\` |"
            echo "| result | \`${{ job.status }}\` |"
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Moon run report summary
        if: always()
        continue-on-error: true
        uses: moonrepo/run-report-action@bbe7e99bf2aca819ec660ec01fc59d84bdd492d6 # v1.10.0
        with:
          access-token: ${{ github.token }}
          skip-comment: 'true'
