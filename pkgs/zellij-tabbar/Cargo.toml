[package]
name = "zellij-tabbar"
version = "0.1.0"
edition = "2021"
description = "Zellij tab bar plugin for Pi agent sessions"
license = "MIT"

[dependencies]
ansi_term = "0.12"
chrono = "0.4"
minijinja = "2.21"
minijinja-embed = "2.21"
serde = { version = "1", features = ["derive"] }
zellij-template-render = { path = "../zellij-template-render" }
zellij-tile = "0.44.3"
zellij-tile-utils = "0.44.3"

[build-dependencies]
minijinja-embed = "2.21"

[lints.clippy]
too_many_arguments = "allow"
useless_format = "allow"
