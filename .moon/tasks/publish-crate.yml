inheritedBy:
  tags:
    - publishes-crate

tasks:
  publish-crate:
    deps:
      - "~:test"
    options:
      cache: false
    script: |
      set -euo pipefail
      target="${PUBLISH_TARGET:?PUBLISH_TARGET is required}"
      channel="${PUBLISH_CHANNEL:?PUBLISH_CHANNEL is required}"
      version="${PUBLISH_VERSION:?PUBLISH_VERSION is required}"
      tag="${PUBLISH_RELEASE_TAG:?PUBLISH_RELEASE_TAG is required}"
      ref="${PUBLISH_REF:?PUBLISH_REF is required}"
      : "${CARGO_REGISTRY_TOKEN:?CARGO_REGISTRY_TOKEN is required}"

      [[ "${target}" == "${MOON_PROJECT_ID}" ]] || { echo "Unexpected publish target '${target}' for '${MOON_PROJECT_ID}'" >&2; exit 1; }
      [[ "$(git rev-parse HEAD)" == "${ref}" ]] || { echo "PUBLISH_REF does not match HEAD" >&2; exit 1; }
      [[ -z "$(git status --porcelain)" ]] || { echo "Publishing requires a clean worktree" >&2; exit 1; }
      [[ "${tag}" == "${target}-v${version}" ]] || { echo "Unexpected release tag '${tag}'" >&2; exit 1; }
      case "${channel}" in
        latest)
          [[ "${version}" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] || { echo "Invalid stable version '${version}'" >&2; exit 1; }
          ;;
        next)
          [[ "${version}" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)-next\.[0-9]+\.[0-9]+$ ]] || { echo "Invalid next version '${version}'" >&2; exit 1; }
          ;;
        *)
          echo "Invalid publish channel '${channel}'" >&2
          exit 1
          ;;
      esac

      manifest="$PWD/Cargo.toml"
      manifest_path="$(realpath "$manifest")"
      package_name="$(
        cargo metadata --no-deps --format-version 1 --manifest-path "$manifest" |
          jq -r --arg manifest "$manifest_path" 'first(.packages[] | select(.manifest_path == $manifest) | .name) // empty'
      )"
      [[ "${package_name}" == "${target}" ]] || { echo "Cargo package '${package_name}' does not match Moon target '${target}'" >&2; exit 1; }

      workspace_manifest="$(cargo locate-project --workspace --message-format plain)"
      lockfile="$(dirname "$workspace_manifest")/Cargo.lock"
      manifest_backup="$(mktemp)"
      lockfile_backup="$(mktemp)"
      cp "$manifest" "$manifest_backup"
      cp "$lockfile" "$lockfile_backup"
      cleanup() {
        cp "$manifest_backup" "$manifest"
        cp "$lockfile_backup" "$lockfile"
        rm -f "$manifest_backup" "$lockfile_backup"
      }
      trap cleanup EXIT

      python3 - "$manifest" "$version" <<'PY'
      import re
      import sys
      from pathlib import Path

      path = Path(sys.argv[1])
      version = sys.argv[2]
      source = path.read_text()
      updated, count = re.subn(
          r'(?ms)(^\[package\]\s*.*?^version\s*=\s*")[^"]+("\s*$)',
          rf'\g<1>{version}\g<2>',
          source,
          count=1,
      )
      if count != 1:
          raise SystemExit("Cargo.toml must contain one [package] version")
      path.write_text(updated)
      PY

      resolved_version="$(
        cargo metadata --no-deps --format-version 1 --manifest-path "$manifest" |
          jq -r --arg manifest "$manifest_path" 'first(.packages[] | select(.manifest_path == $manifest) | .version) // empty'
      )"
      [[ "${resolved_version}" == "${version}" ]] || { echo "Cargo resolved version '${resolved_version}', expected '${version}'" >&2; exit 1; }

      cargo publish --dry-run --manifest-path "$manifest" --allow-dirty
      cargo publish --manifest-path "$manifest" --allow-dirty
